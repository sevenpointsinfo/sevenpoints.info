<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seven Points</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('sevenpointsbg.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero img {
  width: 100px;
  margin-bottom: 20px;
}

.hero p {
  font-size: 22px;
  letter-spacing: 2px;
}

/* SECTION */
.section {
  padding: 100px 20px;
  text-align: center;
}

.section h2 {
  font-size: 36px;
  margin-bottom: 40px;
  letter-spacing: 1px;
}

/* SERVICES */
.services {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  padding: 30px;
  width: 260px;
  border-radius: 12px;
  border: 1px solid #222;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #555;
}

.card h3 {
  margin-bottom: 10px;
}

/* CONTACT */
.contact {
  background: #111;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* MOBILE */
@media(max-width:768px){
  .hero img { width: 70px; }
  .hero p { font-size: 16px; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content fade">
    <img src="logo.png">
    <p>Construction • Event Management • General Services</p>
  </div>
</div>

<!-- SERVICES -->
<div class="section fade">
  <h2>Our Services</h2>
  <div class="services">

    <div class="card">
      <h3>Construction</h3>
      <p>Residential & Commercial Projects</p>
    </div>

    <div class="card">
      <h3>Event Management</h3>
      <p>Corporate Events & Full Setup</p>
    </div>

    <div class="card">
      <h3>Printing</h3>
      <p>Branding & Large Format Printing</p>
    </div>

  </div>
</div>

<!-- CONTACT -->
<div class="section contact fade">
  <h2>Contact</h2>
  <p>Phone: +964 XXX XXX XXX</p>
  <p>Email: info@sevenpoints.info</p>
  <p>Dahuk, Iraq</p>
</div>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const rect = el.getBoundingClientRect().top;
    if(rect < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
